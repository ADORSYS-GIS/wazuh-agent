name: Build and Publish Packages

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.8.0)'
        required: true

permissions: {}

jobs:
  # ============================================
  # Build Linux Packages (deb, rpm, apk)
  # ============================================
  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            VERSION="0.0.0-pr${{ github.event.pull_request.number }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Install nFPM
        run: |
          echo 'deb [trusted=yes] https://repo.nfpm.dev/apt /' | sudo tee /etc/apt/sources.list.d/nfpm.list
          sudo apt-get update
          sudo apt-get install -y nfpm
          nfpm --version

      - name: Create tools directory for Chocolatey files
        run: |
          mkdir -p tools/files/active-response
          cp files/active-response/disable-usb-storage.ps1 tools/files/active-response/
          cp files/active-response/alert-usb-hid.ps1 tools/files/active-response/

      - name: Build Linux packages (Base and Variants)
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          for config in nfpm.yaml nfpm-suricata.yaml nfpm-snort.yaml; do
            echo "Building packages for $config..."
            VERSION=$VERSION nfpm package --config $config --packager deb --target .
            VERSION=$VERSION nfpm package --config $config --packager rpm --target .
            VERSION=$VERSION nfpm package --config $config --packager apk --target .
          done
          ls -la ./*.deb ./*.rpm ./*.apk

      - name: Upload Linux packages as artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-packages
          path: |
            *.deb
            *.rpm
            *.apk

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        if: github.event_name == 'push'
        with:
          files: |
            *.deb
            *.rpm
            *.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Build Windows Chocolatey Package
  # ============================================
  build-windows:
    name: Build Chocolatey Package
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $VERSION = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.event_name }}" -eq "pull_request") {
            $VERSION = "0.0.0-pr${{ github.event.pull_request.number }}"
          } else {
            $VERSION = "${{ github.ref }}" -replace "refs/tags/v", ""
          }
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $VERSION"

      - name: Verify Chocolatey is available
        run: choco --version

      - name: Create tools directory structure
        run: |
          New-Item -ItemType Directory -Path "tools/files/active-response" -Force
          Copy-Item files/active-response/disable-usb-storage.ps1 tools/files/active-response/
          Copy-Item files/active-response/alert-usb-hid.ps1 tools/files/active-response/

      - name: Build Chocolatey packages (Base and Variants)
        env:
          ChocolateyPackageVersion: ${{ steps.version.outputs.VERSION }}
        run: |
          $ver = $env:ChocolateyPackageVersion
          foreach ($nuspec in @("wazuh-agent-bundle.nuspec", "wazuh-agent-bundle-suricata.nuspec", "wazuh-agent-bundle-snort.nuspec")) {
            Write-Host "Packing $nuspec with version $ver..."
            # Substitute version variable in nuspec file before packing
            $content = Get-Content $nuspec
            $content -replace '\$env:ChocolateyPackageVersion', $ver | Set-Content $nuspec
            choco pack $nuspec
          }
          ls *.nupkg

      - name: Upload Chocolatey package as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: chocolatey-package
          path: '*.nupkg'

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        if: github.event_name == 'push'
        with:
          files: '*.nupkg'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Publish to Package Repositories
  # ============================================
  publish-repos:
    name: Publish to Repositories
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup GitHub Pages for APT repo
        run: |
          mkdir -p apt-repo/pool/main/w/wazuh-agent-bundle
          cp artifacts/linux-packages/*.deb apt-repo/pool/main/w/wazuh-agent-bundle/

      - name: Setup GitHub Pages for RPM repo
        run: |
          mkdir -p rpm-repo/packages
          cp artifacts/linux-packages/*.rpm rpm-repo/packages/

      - name: Setup GitHub Pages for Chocolatey feed
        run: |
          mkdir -p choco-feed
          cp artifacts/chocolatey-package/*.nupkg choco-feed/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apt-repo
          destination_dir: apt
          keep_files: true

      - name: Deploy RPM repo to GitHub Pages
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./rpm-repo
          destination_dir: rpm
          keep_files: true

      - name: Deploy Chocolatey feed to GitHub Pages
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./choco-feed
          destination_dir: choco
          keep_files: true

  # ============================================
  # Update Homebrew Tap
  # ============================================
  update-homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: [build-linux]
    if: github.event_name == 'push'
    steps:
      - name: Checkout main repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout homebrew tap repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ADORSYS-GIS/homebrew-wazuh-agent
          token: ${{ secrets.RELEASE_PAT }}
          path: homebrew-tap

      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Copy formula to tap
        run: |
          cp homebrew-wazuh-agent/Formula/wazuh-agent-bundle.rb homebrew-tap/Formula/

      - name: Update formula version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i "s/tag:      \"v.*\"/tag:      \"v$VERSION\"/g" homebrew-tap/Formula/wazuh-agent-bundle.rb

      - name: Commit and push to tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/wazuh-agent-bundle.rb
          git commit -m "Update wazuh-agent-bundle to v${{ steps.version.outputs.VERSION }}"
          git push
